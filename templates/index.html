<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聽見下雨的聲音 - 專屬生活 BGM 平台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="background-color: {{ bg_color }}; transition: background-color 0.8s ease;">

    <div class="container">
        <header>
            <h1>🌧️ 聽見下雨的聲音</h1>
            <p class="subtitle">感官調節即服務（Vibe as a Service）</p>
            <div class="weather-badge">
                當前環境感知：<strong>{{ '雨天 🌧️' if weather == 'Rainy' else '晴天 ☀️' }}</strong>
            </div>
        </header>

        <form action="/" method="POST" class="mood-form">
            
            <div class="form-group">
                <label for="weather-select">模擬環境氣象：</label>
                <select name="weather" id="weather-select" onchange="this.form.submit()">
                    <option value="Clear" {{ 'selected' if weather == 'Clear' }}>☀️ 晴天 (Clear)</option>
                    <option value="Rainy" {{ 'selected' if weather == 'Rainy' }}>🌧️ 雨天 (Rainy)</option>
                </select>
            </div>

            <main class="mood-section">
                <h3>現在的你，心境如何？</h3>
                
                <div class="button-grid">
                    <button type="submit" name="mood" value="Relaxed" class="mood-btn">🌱 悠閒放鬆</button>
                    <button type="submit" name="mood" value="Tired" class="mood-btn">🥱 極度疲憊</button>
                    <button type="submit" name="mood" value="Anxious" class="mood-btn">🤯 焦慮爆炸</button>
                    <button type="submit" name="mood" value="Lazy" class="mood-btn">☕ 慵懶無聊</button>
                    <button type="submit" name="mood" value="Happy" class="mood-btn">🥳 快樂活力</button>
                    <button type="submit" name="mood" value="Calm" class="mood-btn">📖 平靜孤獨</button>
                    <button type="submit" name="mood" value="Emo" class="mood-btn">🩹 感性傷心</button>
                </div>

                <div class="focus-zone">
                    <button type="submit" name="mood" value="Focus" class="focus-btn">🧠 進入心流（讀書/趕報告專用）</button>
                </div>
            </main>
        </form>

        <hr>

        <section class="player-section">
            <div class="music-card">
                <h3>🎵 系統為你當下氛圍調頻的專屬生活 BGM：</h3>
                
                <div class="video-container">
                    <iframe 
                        width="560" 
                        height="315" 
                        src="{{ music_url }}" 
                        title="YouTube video player" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        referrerpolicy="strict-origin-when-cross-origin" 
                        allowfullscreen>
                    </iframe>
                </div>
            </div>
        </section>
    </div>

</body>
</html>
